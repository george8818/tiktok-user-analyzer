version: "3.9"

services:
  app:
    build: .
    container_name: tiktok-analyzer
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Run tests
  test:
    build: .
    container_name: tiktok-analyzer-test
    command: python -m pytest tests/ -v --tb=short
    volumes:
      - .:/app
    environment:
      - ANTHROPIC_API_KEY=sk-ant-test-key
      - DATABASE_URL=sqlite+aiosqlite:///./test_data/test.db
      - PYTHONUNBUFFERED=1
    profiles:
      - test
